<!DOCTYPE html>
<html lang="ko">

<script>
(function(){
  if(window.self !== window.top){
    try {
      Object.defineProperty(window.history,'pushState',{value:function(){},writable:false,configurable:false});
      Object.defineProperty(window.history,'replaceState',{value:function(){},writable:false,configurable:false});
    } catch(e) {
      window.history.pushState=function(){};
      window.history.replaceState=function(){};
    }
    window.addEventListener('beforeunload',function(e){e.stopImmediatePropagation();},true);
    window.addEventListener('hashchange',function(e){e.stopImmediatePropagation();},true);
    window.addEventListener('popstate',function(e){e.stopImmediatePropagation();},true);
  }
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f0f6ff; }

}
.search-wrap select:focus, .search-wrap input[type="text"]:focus { border-color: #2e8bff; }
.search-wrap input::placeholder { color: #aaa; font-size: 15px; }
.btn-row { display: flex; gap: 10px; }
.btn-search {
  flex: 1; padding: 16px 10px;

.loading.show { display: flex; align-items: center; justify-content: center; gap: 10px; }
.loading-spinner { width: 22px; height: 22px; border: 3px solid #c5dcff; border-top-color: #2e8bff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.no-result { display: none; text-align: center; padding: 24px; font-size: 16px; color: #888; background: #f0f6ff; }
.no-result.show { display: block; }
.result-area { background: #f0f6ff; max-height: 320px; overflow-y: auto; }
.result-area::-webkit-scrollbar { width: 5px; }
.result-area::-webkit-scrollbar-thumb { background: #b8d8ff; border-radius: 3px; }
.result-header { padding: 14px 18px 10px; display: flex; align-items: center; justify-content: space-between; background: #daeaff; border-bottom: 2px solid #b8d8ff; position: sticky; top: 0; z-index: 1; }
.result-title { font-size: 17px; font-weight: 700; color: #1a4fa0; }

.result-list { list-style: none; padding: 10px 14px 14px; }
.result-item { padding: 14px 16px; background: #fff; border: 2px solid #d0e8ff; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; display: flex; align-items: flex-start; gap: 14px; }
.result-item:hover { background: #e8f4ff; border-color: #2e8bff; }
.result-num { width: 32px; height: 32px; background: #1a6fd4; color: #fff; border-radius: 50%; font-size: 15px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.result-info { flex: 1; }
.place-name { font-size: 16px; font-weight: 700; color: #1a1a1a; line-height: 1.4; }
.place-addr { font-size: 14px; color: #6688aa; margin-top: 4px; line-height: 1.5; }
.kakao-banner { background: linear-gradient(135deg, #1a6fd4, #2e8bff); padding: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
.kakao-banner-text { color: #fff; font-size: 15px; line-height: 1.7; font-weight: 500; }

.kakao-btn { display: inline-flex; align-items: center; gap: 8px; background: #FEE500; color: #3C1E1E; font-size: 16px; font-weight: 700; padding: 12px 22px; border-radius: 10px; text-decoration: none; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif; }
.kakao-btn:hover { opacity: 0.88; }
@media (max-width: 600px) {
  #map { height: 380px; }
  .header-title { font-size: 22px; }

  .kakao-banner { flex-direction: column; text-align: center; }
  .kakao-btn { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🗺️</div>
  <div class="header-title">내 <span>묘지 위치</span> 찾기</div>
  <div class="header-sub">다온벌초대행 · 전국 묘지 위치 검색</div>
</div>

<div class="guide-box">
  📍 <strong>시/도 → 시군구</strong>를 선택하거나<br>
  묘지 이름 또는 주소를 입력 후 <strong>검색</strong>하세요.<br>
  <strong>📡 내 위치 찾기</strong> 버튼으로 현재 주변 묘지도 확인할 수 있습니다.
</div>

<div class="search-wrap">
  <div class="search-row">
    <select id="sido" onchange="loadSigungu()">
      <option value="">📌 시 / 도 선택</option>
      <option>서울특별시</option><option>부산광역시</option><option>대구광역시</option>
      <option>인천광역시</option><option>광주광역시</option><option>대전광역시</option>
      <option>울산광역시</option><option>세종특별자치시</option><option>경기도</option>
      <option>강원특별자치도</option><option>충청북도</option><option>충청남도</option>
      <option>전북특별자치도</option><option>전라남도</option><option>경상북도</option>
      <option>경상남도</option><option>제주특별자치도</option>
    </select>
    <select id="sigungu"><option value="">🏙️ 시 / 군 / 구 선택</option></select>
  </div>
  <input type="text" id="keyword" placeholder="묘지 이름 또는 상세 주소를 입력하세요 (선택)">
  <div class="btn-row">
    <button class="btn-search" onclick="searchPlace()">🔍 &nbsp;묘지 검색하기</button>
    <button class="btn-gps" onclick="getMyLocation()">📡 &nbsp;내 위치 찾기</button>
  </div>
</div>

<div class="gps-info" id="gpsInfo"></div>
<div id="map"></div>
<div class="loading" id="loading"><div class="loading-spinner"></div><span>검색 중입니다...</span></div>
<div class="no-result" id="noResult">😔 검색 결과가 없습니다. 다른 키워드로 다시 시도해보세요.</div>
<div class="result-area" id="resultArea" style="display:none;">
  <div class="result-header">
    <div class="result-title">🔎 검색 결과</div>
    <div class="result-badge" id="resultBadge"></div>
  </div>
  <ul class="result-list" id="resultList"></ul>
</div>

<div class="kakao-banner">
  <div class="kakao-banner-text">
    묘지 위치를 찾으셨나요?<br>
    <strong>벌초 · 성묘 대행 서비스</strong>를 카카오톡으로 간편하게 신청하세요!
  </div>
  <a class="kakao-btn" href="https://pf.kakao.com/_xoxhUxbxj/chat" target="_blank" rel="noopener">💬 &nbsp;카카오톡 상담하기</a>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=3529645d623ed6d1250d670688d02130&libraries=services&autoload=false"></script>
<script>
var sigunguData = {
  '서울특별시':['종로구','중구','용산구','성동구','광진구','동대문구','중랑구','성북구','강북구','도봉구','노원구','은평구','서대문구','마포구','양천구','강서구','구로구','금천구','영등포구','동작구','관악구','서초구','강남구','송파구','강동구'],
  '부산광역시':['중구','서구','동구','영도구','부산진구','동래구','남구','북구','해운대구','사하구','금정구','강서구','연제구','수영구','사상구','기장군'],
  '대구광역시':['중구','동구','서구','남구','북구','수성구','달서구','달성군','군위군'],
  '인천광역시':['중구','동구','미추홀구','연수구','남동구','부평구','계양구','서구','강화군','옹진군'],
  '광주광역시':['동구','서구','남구','북구','광산구'],
  '대전광역시':['동구','중구','서구','유성구','대덕구'],
  '울산광역시':['중구','남구','동구','북구','울주군'],
  '세종특별자치시':['세종시'],
  '경기도':['수원시','성남시','의정부시','안양시','부천시','광명시','평택시','동두천시','안산시','고양시','과천시','구리시','남양주시','오산시','시흥시','군포시','의왕시','하남시','용인시','파주시','이천시','안성시','김포시','화성시','광주시','양주시','포천시','여주시','연천군','가평군','양평군'],
  '강원특별자치도':['춘천시','원주시','강릉시','동해시','태백시','속초시','삼척시','홍천군','횡성군','영월군','평창군','정선군','철원군','화천군','양구군','인제군','고성군','양양군'],
  '충청북도':['청주시','충주시','제천시','보은군','옥천군','영동군','증평군','진천군','괴산군','음성군','단양군'],
  '충청남도':['천안시','공주시','보령시','아산시','서산시','논산시','계룡시','당진시','금산군','부여군','서천군','청양군','홍성군','예산군','태안군'],
  '전북특별자치도':['전주시','군산시','익산시','정읍시','남원시','김제시','완주군','진안군','무주군','장수군','임실군','순창군','고창군','부안군'],
  '전라남도':['목포시','여수시','순천시','나주시','광양시','담양군','곡성군','구례군','고흥군','보성군','화순군','장흥군','강진군','해남군','영암군','무안군','함평군','영광군','장성군','완도군','진도군','신안군'],
  '경상북도':['포항시','경주시','김천시','안동시','구미시','영주시','영천시','상주시','문경시','경산시','의성군','청송군','영양군','영덕군','청도군','고령군','성주군','칠곡군','예천군','봉화군','울진군','울릉군'],
  '경상남도':['창원시','진주시','통영시','사천시','김해시','밀양시','거제시','양산시','의령군','함안군','창녕군','고성군','남해군','하동군','산청군','함양군','거창군','합천군'],
  '제주특별자치도':['제주시','서귀포시']
};

var map, ps, markers=[], infowindows=[], myMarker=null;

kakao.maps.load(function(){
  if(window.self !== window.top){
    try {
      Object.defineProperty(window.history,'pushState',{value:function(){},writable:false,configurable:false});
      Object.defineProperty(window.history,'replaceState',{value:function(){},writable:false,configurable:false});
    } catch(e){}
  }
  map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(36.5,127.5), level: 13 });
  ps = new kakao.maps.services.Places();
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
  map.addControl(new kakao.maps.MapTypeControl(), kakao.maps.ControlPosition.TOPRIGHT);
});

function loadSigungu(){
  var sido=document.getElementById('sido').value;
  var sg=document.getElementById('sigungu');
  sg.innerHTML='<option value="">🏙️ 시 / 군 / 구 선택</option>';
  (sigunguData[sido]||[]).forEach(function(v){ var o=document.createElement('option'); o.value=v; o.textContent=v; sg.appendChild(o); });
}

function searchPlace(){
  var sido=document.getElementById('sido').value;
  var sigungu=document.getElementById('sigungu').value;
  var kw=document.getElementById('keyword').value.trim();
  if(!sido && !kw){ alert('시/도를 선택하거나 주소를 입력해주세요.'); return; }
  var q=(sido?sido+' ':'')+(sigungu?sigungu+' ':'')+( kw||'묘지 공원묘지 납골당');
  clearMarkers(); showLoading(true); hideResult();
  ps.keywordSearch(q, function(data,status){
    showLoading(false);
    if(status===kakao.maps.services.Status.OK){ displayResults(data); }
    else {
      ps.keywordSearch((sido?sido+' ':'')+(sigungu?sigungu+' ':'')+'공원묘지', function(d2,s2){
        if(s2===kakao.maps.services.Status.OK){ displayResults(d2); }
        else{ document.getElementById('noResult').classList.add('show'); }
      });
    }
  },{size:15});
}

function displayResults(data){
  var bounds=new kakao.maps.LatLngBounds();
  var list=document.getElementById('resultList');
  list.innerHTML='';
  data.forEach(function(place,i){
    var pos=new kakao.maps.LatLng(place.y,place.x);
    bounds.extend(pos);
    var marker=new kakao.maps.Marker({map:map,position:pos});
    markers.push(marker);
    var iw=new kakao.maps.InfoWindow({ content:'<div style="padding:10px 14px;font-size:15px;font-weight:700;color:#1a4fa0;white-space:nowrap;border-bottom:3px solid #2e8bff;">'+place.place_name+'</div>', removable:true });
    infowindows.push(iw);
    kakao.maps.event.addListener(marker,'click',(function(m,w){ return function(){ infowindows.forEach(function(x){x.close();}); w.open(map,m); }; })(marker,iw));
    var li=document.createElement('li');
    li.className='result-item';
    li.innerHTML='<div class="result-num">'+(i+1)+'</div><div class="result-info"><div class="place-name">'+place.place_name+'</div><div class="place-addr">📍 '+(place.road_address_name||place.address_name)+'</div></div>';
    li.onclick=(function(p,m,w){ return function(){ map.setCenter(p); map.setLevel(4); infowindows.forEach(function(x){x.close();}); w.open(map,m); }; })(pos,marker,iw);
    list.appendChild(li);
  });
  map.setBounds(bounds);
  document.getElementById('resultArea').style.display='block';
  document.getElementById('resultBadge').textContent=data.length+'건';
}

function getMyLocation(){
  if(!navigator.geolocation){ alert('위치 정보를 지원하지 않는 브라우저입니다.'); return; }
  showLoading(true);
  navigator.geolocation.getCurrentPosition(function(pos){
    showLoading(false);
    var lat=pos.coords.latitude, lng=pos.coords.longitude;
    var position=new kakao.maps.LatLng(lat,lng);
    if(myMarker) myMarker.setMap(null);
    myMarker=new kakao.maps.Marker({ map:map, position:position, image:new kakao.maps.MarkerImage('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',new kakao.maps.Size(28,40)) });
    map.setCenter(position); map.setLevel(7);
    document.getElementById('gpsInfo').textContent='📡 현재 위치를 기준으로 주변 묘지를 검색합니다.';
    document.getElementById('gpsInfo').classList.add('show');
    clearMarkers();
    ps.keywordSearch('묘지 공원묘지 납골당', function(data,status){
      if(status===kakao.maps.services.Status.OK){ displayResults(data); }
      else{ document.getElementById('noResult').classList.add('show'); }
    },{location:position,radius:20000,size:15});
  }, function(){ showLoading(false); alert('위치 권한을 허용해주세요.'); });
}

function clearMarkers(){ markers.forEach(function(m){m.setMap(null);}); markers=[]; infowindows.forEach(function(w){w.close();}); infowindows=[]; }
function showLoading(s){ document.getElementById('loading').classList.toggle('show',s); }
function hideResult(){ document.getElementById('resultArea').style.display='none'; document.getElementById('noResult').classList.remove('show'); }
document.addEventListener('DOMContentLoaded',function(){ document.getElementById('keyword').addEventListener('keydown',function(e){ if(e.key==='Enter') searchPlace(); }); });

// 핵심: 부모 페이지 메뉴 클릭 감지 → 강제 새로고침
(function(){
  if(window.self !== window.top){
    try {
      var parentDoc = window.parent.document;
      parentDoc.addEventListener('click', function(e){
        var target = e.target.closest('a, button');
        if(target){
          var href = target.getAttribute('href');
          if(href && href !== '#' && !href.startsWith('http')){
            setTimeout(function(){
              window.parent.location.reload();
            }, 50);
          }
        }
      }, true);
    } catch(e){}
  }
