<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실시간 작업현황 - 다온벌초대행</title>
<script>
(function(){
  if(window.self !== window.top){
    try {
      Object.defineProperty(window.history,'pushState',{value:function(){},writable:false,configurable:false});
      Object.defineProperty(window.history,'replaceState',{value:function(){},writable:false,configurable:false});
    } catch(e) {
      window.history.pushState=function(){};
      window.history.replaceState=function(){};
    }
    window.addEventListener('beforeunload',function(e){e.stopImmediatePropagation();},true);
    window.addEventListener('hashchange',function(e){e.stopImmediatePropagation();},true);
    window.addEventListener('popstate',function(e){e.stopImmediatePropagation();},true);
    // setInterval 차단 - 부모 페이지에 영향 주는 주기적 실행 방지
    var _setInterval = window.setInterval;
    window.setInterval = function(fn, delay){
      if(delay < 60000) return; // 1분 미만 interval 차단
      return _setInterval(fn, delay);
    };
  }
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #f0f6ff; }
.header { background: linear-gradient(135deg, #1a6fd4 0%, #2e8bff 100%); padding: 28px 24px 24px; text-align: center; }
.header-icon { font-size: 40px; margin-bottom: 8px; }
.header-title { font-size: 24px; font-weight: 900; color: #fff; }
.header-title span { color: #ffe066; }
.header-sub { font-size: 14px; color: rgba(255,255,255,0.85); margin-top: 6px; }
.stats-wrap { display: flex; gap: 10px; padding: 16px; background: #daeaff; flex-wrap: wrap; }
.stat-card { flex: 1; min-width: 100px; background: #fff; border-radius: 12px; padding: 14px 10px; text-align: center; box-shadow: 0 2px 8px rgba(46,139,255,0.1); border-top: 4px solid #2e8bff; }
.stat-num { font-size: 28px; font-weight: 900; color: #1a6fd4; }
.stat-label { font-size: 12px; color: #888; margin-top: 4px; font-weight: 500; }
.filter-wrap { background: #e3f0ff; padding: 14px 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; border-bottom: 2px solid #b8d8ff; }
.filter-wrap select { padding: 10px 14px; border: 2px solid #b8d8ff; border-radius: 8px; font-size: 15px; background: #fff; color: #222; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; flex: 1; min-width: 130px; outline: none; }
.filter-wrap select:focus { border-color: #2e8bff; }
.btn-refresh { padding: 10px 18px; background: linear-gradient(135deg, #1a6fd4, #2e8bff); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }
.btn-refresh:hover { opacity: 0.9; }
.loading { text-align: center; padding: 50px 20px; color: #1a6fd4; font-size: 16px; font-weight: 600; }
.loading-spinner { width: 40px; height: 40px; border: 4px solid #c5dcff; border-top-color: #2e8bff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: #fff0f0; border-left: 5px solid #e74c3c; padding: 16px 20px; margin: 16px; border-radius: 8px; font-size: 14px; color: #c0392b; display: none; }
.error-box.show { display: block; }
.list-wrap { padding: 14px 14px 20px; }
.list-title { font-size: 16px; font-weight: 700; color: #1a4fa0; margin-bottom: 12px; padding: 10px 14px; background: #daeaff; border-radius: 8px; border-left: 5px solid #2e8bff; }
.work-card { background: #fff; border: 2px solid #d0e8ff; border-radius: 14px; padding: 18px 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(46,139,255,0.08); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.card-id { font-size: 12px; color: #888; font-weight: 500; }
.card-badge { padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; }
.badge-done { background: #e8fff5; color: #16a34a; border: 2px solid #16c784; }
.badge-ing { background: #fff7e6; color: #d97706; border: 2px solid #f59e0b; }
.card-region { font-size: 19px; font-weight: 900; color: #1a1a1a; margin-bottom: 8px; line-height: 1.3; }
.card-detail { font-size: 14px; color: #5588aa; margin-bottom: 12px; }
.card-info { display: flex; flex-wrap: wrap; gap: 8px; }
.info-chip { display: inline-flex; align-items: center; gap: 5px; background: #f0f6ff; border: 1px solid #c5dcff; border-radius: 8px; padding: 6px 12px; font-size: 13px; color: #1a4fa0; font-weight: 600; }
.card-date { font-size: 13px; color: #aaa; margin-top: 10px; text-align: right; }
.empty-box { text-align: center; padding: 50px 20px; color: #aaa; font-size: 16px; display: none; }
.empty-box.show { display: block; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.kakao-banner { background: linear-gradient(135deg, #1a6fd4, #2e8bff); padding: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
.kakao-banner-text { color: #fff; font-size: 15px; line-height: 1.7; }
.kakao-banner-text strong { color: #ffe066; font-size: 16px; }
.kakao-btn { display: inline-flex; align-items: center; gap: 8px; background: #FEE500; color: #3C1E1E; font-size: 16px; font-weight: 700; padding: 12px 22px; border-radius: 10px; text-decoration: none; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif; }
.kakao-btn:hover { opacity: 0.88; }
.update-time { text-align: center; font-size: 12px; color: #aaa; padding: 8px; background: #f8fbff; }
@media (max-width: 600px) {
  .stat-num { font-size: 22px; }
  .card-region { font-size: 17px; }
  .kakao-banner { flex-direction: column; text-align: center; }
  .kakao-btn { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📋</div>
  <div class="header-title">실시간 <span>작업현황</span></div>
  <div class="header-sub">다온벌초대행 · 전국 현장 작업 현황을 실시간으로 확인하세요</div>
</div>

<div class="stats-wrap">
  <div class="stat-card"><div class="stat-num" id="totalCount">-</div><div class="stat-label">전체 작업</div></div>
  <div class="stat-card"><div class="stat-num" id="doneCount">-</div><div class="stat-label">완료</div></div>
  <div class="stat-card"><div class="stat-num" id="ingCount">-</div><div class="stat-label">진행중</div></div>
  <div class="stat-card"><div class="stat-num" id="photoCount">-</div><div class="stat-label">사진 등록</div></div>
</div>

<div class="filter-wrap">
  <select id="filterRegion" onchange="applyFilter()"><option value="">📌 전체 지역</option></select>
  <select id="filterType" onchange="applyFilter()">
    <option value="">🏔️ 전체 묘지유형</option>
    <option>야산</option><option>공원묘지</option><option>납골당 주변</option><option>선산</option><option>기타</option>
  </select>
  <button class="btn-refresh" onclick="loadData()">🔄 새로고침</button>
</div>

<div class="error-box" id="errorBox">⚠️ 데이터를 불러오는 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.</div>
<div class="loading" id="loading"><div class="loading-spinner"></div><br>작업현황을 불러오는 중입니다...</div>

<div class="list-wrap" id="listWrap" style="display:none;">
  <div class="list-title" id="listTitle">작업 목록</div>
  <div id="cardList"></div>
  <div class="empty-box" id="emptyBox"><div class="empty-icon">🔍</div>해당 조건의 작업 내역이 없습니다.</div>
</div>

<div class="update-time" id="updateTime"></div>

<div class="kakao-banner">
  <div class="kakao-banner-text">
    벌초·성묘 대행 서비스를 신청하시겠어요?<br>
    <strong>카카오톡으로 간편하게 상담</strong>받으실 수 있습니다!
  </div>
  <a class="kakao-btn" href="https://pf.kakao.com/_xoxhUxbxj/chat" target="_blank" rel="noopener">
    💬 &nbsp;카카오톡 상담하기
  </a>
</div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbyzz2cgoFdmNtoMOCFvQ0ipuX5t4iOAETkDpgusgOa_9o0LF_G_FS452YUJzLIbqQJGsA/exec';
var allData = [];
var isLoading = false;

function loadData() {
  if(isLoading) return;
  isLoading = true;

  document.getElementById('loading').style.display = 'block';
  document.getElementById('listWrap').style.display = 'none';
  document.getElementById('errorBox').classList.remove('show');

  fetch(API_URL, {
    method: 'GET',
    redirect: 'follow',
    mode: 'cors',
    credentials: 'omit'
  })
  .then(function(r){ return r.json(); })
  .then(function(res){
    isLoading = false;
    document.getElementById('loading').style.display = 'none';
    if(res && res.status === 'ok'){
      allData = res.data || [];
      buildRegionFilter(allData);
      renderCards(allData);
      updateStats(allData);
      var now = new Date();
      document.getElementById('updateTime').textContent =
        '마지막 업데이트: ' + now.getFullYear() + '.' +
        String(now.getMonth()+1).padStart(2,'0') + '.' +
        String(now.getDate()).padStart(2,'0') + ' ' +
        String(now.getHours()).padStart(2,'0') + ':' +
        String(now.getMinutes()).padStart(2,'0');
    } else {
      document.getElementById('errorBox').classList.add('show');
    }
  })
  .catch(function(){
    isLoading = false;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('errorBox').classList.add('show');
  });
}

function buildRegionFilter(data) {
  var regions = {};
  data.forEach(function(d){ if(d.region) regions[d.region] = true; });
  var sel = document.getElementById('filterRegion');
  sel.innerHTML = '<option value="">📌 전체 지역</option>';
  Object.keys(regions).sort().forEach(function(r){
    var o = document.createElement('option'); o.value=r; o.textContent=r; sel.appendChild(o);
  });
}

function applyFilter() {
  var region = document.getElementById('filterRegion').value;
  var type = document.getElementById('filterType').value;
  var filtered = allData.filter(function(d){
    return (!region||(d.region&&d.region.indexOf(region)>=0))&&(!type||d.type===type);
  });
  renderCards(filtered);
}

function renderCards(data) {
  var list = document.getElementById('cardList');
  var empty = document.getElementById('emptyBox');
  document.getElementById('listWrap').style.display = 'block';
  list.innerHTML = '';
  document.getElementById('listTitle').textContent = '작업 목록 ('+data.length+'건)';
  if(!data.length){ empty.classList.add('show'); return; }
  empty.classList.remove('show');
  var sorted = data.slice().sort(function(a,b){ return String(b.date).localeCompare(String(a.date)); });
  sorted.forEach(function(d){
    var dateStr = d.date ? String(d.date).substring(0,10) : '';
    var isDone = d.photos && d.photos > 0;
    var card = document.createElement('div');
    card.className = 'work-card';
    card.innerHTML =
      '<div class="card-header">'+
        '<span class="card-id">'+(d.id||'')+'</span>'+
        '<span class="card-badge '+(isDone?'badge-done':'badge-ing')+'">'+(isDone?'✅ 완료':'🔧 진행중')+'</span>'+
      '</div>'+
      '<div class="card-region">📍 '+(d.region||'지역 미입력')+'</div>'+
      '<div class="card-detail">'+(d.detail||'')+'</div>'+
      '<div class="card-info">'+
        (d.type?'<span class="info-chip">🏔️ '+d.type+'</span>':'')+
        (d.work?'<span class="info-chip">🌿 '+d.work+'</span>':'')+
        (d.hours?'<span class="info-chip">⏱️ '+d.hours+'시간</span>':'')+
        (d.photos?'<span class="info-chip">📷 사진 '+d.photos+'장</span>':'')+
      '</div>'+
      '<div class="card-date">📅 작업일: '+dateStr+'</div>';
    list.appendChild(card);
  });
}

function updateStats(data) {
  var done = data.filter(function(d){ return d.photos&&d.photos>0; }).length;
  var photos = data.reduce(function(sum,d){ return sum+(parseInt(d.photos)||0); },0);
  document.getElementById('totalCount').textContent = data.length;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('ingCount').textContent = data.length-done;
  document.getElementById('photoCount').textContent = photos;
}

// window.onload 대신 DOMContentLoaded 사용
document.addEventListener('DOMContentLoaded', function(){ loadData(); });
</script>
</body>
</html>
